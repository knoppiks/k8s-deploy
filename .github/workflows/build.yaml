name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]

permissions: read-all

env:
  # The following renovate target exists only to trigger a rebuild when a new k8s is
  # released. The versions job will determine actual kubectl versions.
  # renovate: datasource=github-tags depName=kubectl lookupName=kubernetes/kubernetes
  LATEST_K8S_VERSION: v1.35.4
  LATEST_MINORS: 3

jobs:
  versions:
    runs-on: ubuntu-24.04
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
      with:
        egress-policy: audit

    - name: Fetch Kubernetes Versions for Build
      id: versions
      run: |
        versions="$(curl -s https://api.github.com/repos/kubernetes/kubernetes/releases | jq -c '[.[] | select(.prerelease == false) | .tag_name] | group_by(split(".") | [.[0,1]]) | reverse | map(.[0])[:${{ env.LATEST_MINORS }}]')"
        echo "versions=${versions}" >>"${GITHUB_OUTPUT}"

    outputs:
      versions: ${{ steps.versions.outputs.versions }}

  build:
    needs: [ versions ]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      packages: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJSON(needs.versions.outputs.versions) }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Remove Version Prefix
      id: version
      env:
        VERSION: ${{ matrix.k8s_version }}
      run: echo "k8s=${VERSION#v}" >>"${GITHUB_OUTPUT}"

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        tags: |
          type=ref,event=pr,prefix=${{ steps.version.outputs.k8s }}-pr.
          type=raw,value=${{ steps.version.outputs.k8s }},enable={{is_default_branch}}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: push
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: KUBECTL_VERSION=${{ matrix.k8s_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
      with:
        subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  final:
    needs: [ build ]
    runs-on: ubuntu-24.04
    steps:
    - run: echo "Done"
