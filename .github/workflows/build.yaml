name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]

permissions: read-all

env:
  # The following renovate target exists only to trigger a rebuild when a new k8s is
  # released. The versions job will determine actual kubectl versions.
  # renovate: datasource=github-tags depName=kubectl lookupName=kubernetes/kubernetes
  LATEST_K8S_VERSION: v1.36.2
  LATEST_MINORS: 3

jobs:
  versions:
    runs-on: ubuntu-24.04
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Fetch Kubernetes Versions for Build
      id: versions
      run: |
        versions="$(curl -s https://api.github.com/repos/kubernetes/kubernetes/releases | jq -c '[.[] | select(.prerelease == false) | .tag_name] | group_by(split(".") | [.[0,1]]) | reverse | map(.[0])[:${{ env.LATEST_MINORS }}]')"
        echo "versions=${versions}" >>"${GITHUB_OUTPUT}"

    outputs:
      versions: ${{ steps.versions.outputs.versions }}

  build:
    needs: [ versions ]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      packages: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJSON(needs.versions.outputs.versions) }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Remove Version Prefix
      id: version
      env:
        VERSION: ${{ matrix.k8s_version }}
      run: echo "k8s=${VERSION#v}" >>"${GITHUB_OUTPUT}"

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        tags: |
          type=ref,event=pr,prefix=${{ steps.version.outputs.k8s }}-pr.
          type=raw,value=${{ steps.version.outputs.k8s }},enable={{is_default_branch}}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      id: push
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: KUBECTL_VERSION=${{ matrix.k8s_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
      with:
        subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true

  final:
    needs: [ build ]
    runs-on: ubuntu-24.04
    steps:
    - run: echo "Done"
